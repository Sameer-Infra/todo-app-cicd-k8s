kind: HorizontalPodAutoscaler
apiVersion: autoscaling/v2
metadata:
  name: todo-app-hpa
  namespace: todo-app

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    name: todo-app-deployment
    kind: Deployment

  minReplicas: 3
  maxReplicas: 15

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 20
